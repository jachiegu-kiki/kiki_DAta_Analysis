version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: qiantu_postgres
    restart: always
    environment:
      POSTGRES_DB: qiantu_finance
      POSTGRES_USER: qiantu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qiantu2026}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiantu -d qiantu_finance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [qiantu_net]

  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: qiantu_api
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+asyncpg://qiantu:${POSTGRES_PASSWORD:-qiantu2026}@postgres:5432/qiantu_finance
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-CHANGE_ME_INTERNAL}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      # ── ETL 触发：宿主机上本项目的绝对路径 ──
      PROJECT_HOST_DIR: ${PROJECT_HOST_DIR:-/opt/qiantu-finance-v4}
    expose: ["8000"]
    volumes:
      - ./backend/app:/app/app:ro
      # ── ETL 触发所需 ──
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      # compose v2 插件（宿主机路径可能不同，见下方注释）
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      # 关键：把项目挂载到容器内与宿主机完全相同的路径
      # 这样 compose CLI 读到的相对路径（./etl, ./backend 等）被 daemon 正确 resolve
      - ${PROJECT_HOST_DIR:-/opt/qiantu-finance-v4}:${PROJECT_HOST_DIR:-/opt/qiantu-finance-v4}:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [qiantu_net]

  nginx:
    image: nginx:alpine
    container_name: qiantu_nginx
    restart: always
    depends_on:
      api: { condition: service_healthy }
    ports: ["${HTTP_PORT:-8771}:80"]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [qiantu_net]

  etl:
    build: { context: ./etl, dockerfile: Dockerfile }
    container_name: qiantu_etl
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL_SYNC: postgresql://qiantu:${POSTGRES_PASSWORD:-qiantu2026}@postgres:5432/qiantu_finance
      PREDATA_DIR: /data/PreData
      PULLDATA_DIR: /data/PullData
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${PREDATA_PATH:-/kiki/KiKiAutoPullDataScript/PreData}:/data/PreData:ro
      - ${PULLDATA_PATH:-/kiki/n8n_data/PullData}:/data/PullData:ro
      - ./etl/daily_sync.py:/etl/daily_sync.py:ro
    networks: [qiantu_net]
    profiles: [etl]

networks:
  qiantu_net:
    driver: bridge
volumes:
  pg_data:
