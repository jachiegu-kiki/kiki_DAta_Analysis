# ─── 廣州前途財務日報系統 · Docker Compose ────────────────────
# Version: 4.0  (2026-04)
#
# v4 變更:
#   ✅ 移除 POSTGRES_PASSWORD / SECRET_KEY / INTERNAL_API_KEY 的可猜默認值
#      改用 ${VAR:?message} 語法，若 .env 缺失會啟動失敗並給出明確錯誤
#   ✅ postgres 仍對 0.0.0.0 開放（給 8.219.219.57 連接），請確保：
#      (1) 雲安全組入站規則只允許 8.219.219.57/32 進 5432
#      (2) POSTGRES_PASSWORD 為強密碼
#
# 已知風險（未處理，可改 functionality 時再治理）:
#   ⚠ api 容器掛載 /var/run/docker.sock 以供 ETL 觸發按鈕
#     → 容器內拿到 sock 等同宿主機 root 權限
#     → 遷移方案: 用 systemd timer 跑 ETL，或 docker-socket-proxy
# ─────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: qiantu_postgres
    restart: always
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: qiantu_finance
      POSTGRES_USER: qiantu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 设置 POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      # 對外開放 5432 給其他雲服務器（8.219.219.57）連接
      # 安全依賴：雲安全組白名單 + POSTGRES_PASSWORD 強度
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qiantu -d qiantu_finance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [qiantu_net]

  api:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: qiantu_api
    restart: always
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+asyncpg://qiantu:${POSTGRES_PASSWORD:?请在 .env 设置 POSTGRES_PASSWORD}@postgres:5432/qiantu_finance
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?请在 .env 设置 INTERNAL_API_KEY}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      # ── ETL 触发：宿主机上本项目的绝对路径 ──
      PROJECT_HOST_DIR: ${PROJECT_HOST_DIR:-/opt/qiantu-finance-v4}
    expose: ["8000"]
    volumes:
      - ./backend/app:/app/app:ro
      # ── ETL 触发所需（跨容器執行 docker compose run etl）──
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      # compose v2 插件
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
      # 把项目挂载到容器内与宿主机完全相同的路径
      # 這樣 compose CLI 讀到的相对路径（./etl 等）被 daemon 正确 resolve
      - ${PROJECT_HOST_DIR:-/opt/qiantu-finance-v4}:${PROJECT_HOST_DIR:-/opt/qiantu-finance-v4}:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [qiantu_net]

  nginx:
    image: nginx:alpine
    container_name: qiantu_nginx
    restart: always
    depends_on:
      api: { condition: service_healthy }
    ports: ["${HTTP_PORT:-8771}:80"]
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [qiantu_net]

  etl:
    build: { context: ./etl, dockerfile: Dockerfile }
    container_name: qiantu_etl
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL_SYNC: postgresql://qiantu:${POSTGRES_PASSWORD:?请在 .env 设置 POSTGRES_PASSWORD}@postgres:5432/qiantu_finance
      PREDATA_DIR: /data/PreData
      PULLDATA_DIR: /data/PullData
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${PREDATA_PATH:-/kiki/KiKiAutoPullDataScript/PreData}:/data/PreData:ro
      - ${PULLDATA_PATH:-/kiki/n8n_data/PullData}:/data/PullData:ro
      - ./etl/daily_sync.py:/etl/daily_sync.py:ro
    networks: [qiantu_net]
    profiles: [etl]

networks:
  qiantu_net:
    driver: bridge
volumes:
  pg_data:
